workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS && $CI_PIPELINE_SOURCE == "push"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS'
      when: never
    - if: '$CI_COMMIT_BRANCH'

variables:
  GIT_DEPTH: "1"
  DOCKER_DRIVER: overlay2

default:
  tags:
    - maggioli-network

stages:
  - build
  - build:isolate
  - build:storybook
  - test
  - publish
  - test:install
  - deploy:storybook
  - deploy:website

# BASE BUILD
.base-build:
  image: node:18.16
  stage: build
  before_script:
    - apt update && apt install jq -y
    - npm install -g --force nx yarn
    - yarn install --frozen-lockfile --prefer-offline
  cache:
    key:
      files:
        - yarn.lock
    paths:
      - node_modules
      - .cache/puppeteer
      - projects/design-tokens/node_modules
      - projects/styles/node_modules
      - projects/icons/node_modules
      - projects/stencil/node_modules
      - projects/identity/node_modules
    policy: pull-push

# BASE PUBLISH TEST
.base-publish-test:
  extends: .base-build
  stage: test
  variables:
    BUILD_DIR: to_be_extended
  script:
    - cd $BUILD_DIR
    - export LATEST_PUBLISHED_V=\"`npm view @maggioli-design-system/${COMPONENT} dist-tags.latest`\"
    - export TO_BE_PUBLISHED_V=`cat package.json | jq ".version"`
    - echo "VERSION TO BE PUBLISHED ${TO_BE_PUBLISHED_V}"
    - echo "LATEST PUBLISHED VERSION ${LATEST_PUBLISHED_V}"
    - |
      if [ "$LATEST_PUBLISHED_V" = "$TO_BE_PUBLISHED_V" ]; then
        echo "${LATEST_PUBLISHED_V} == ${TO_BE_PUBLISHED_V} : cannot publish!"
        exit 1
      else
        npm publish --access public --dry-run
      fi
  cache:
    policy: pull

# BASE INSTALL TEST
.base-install-test:
  extends: .base-build
  stage: test:install
  variables:
    COMPONENT: to_be_extended
    BUILD_DIR: to_be_extended
    PACK_NAME: to_be_extended
  script:
    - cd $BUILD_DIR
    - npm pack && npm install --prefix ./ $PACK_NAME
  cache:
    policy: pull

# BASE PUBLISH
.base-publish:
  extends: .base-build
  stage: publish
  variables:
    BUILD_DIR: to_be_extended
  script:
    - cd $BUILD_DIR
    - npm config --global set //registry.npmjs.org/:_auth $NPM_TOKEN
    - npm config --global set //registry.npmjs.org/:_authToken $NPM_TOKEN
    - npm publish --access public
  cache:
    policy: pull

include:
  - '/projects/design-tokens/.gitlab-ci.yml'
  - '/projects/icons/.gitlab-ci.yml'
  - '/projects/identity/.gitlab-ci.yml'
  - '/projects/stencil/.gitlab-ci.yml'
  - '/projects/styles/.gitlab-ci.yml'
  - '/projects/svg-icons/.gitlab-ci.yml'
  - '/.deploy/.gitlab-ci.yml'
