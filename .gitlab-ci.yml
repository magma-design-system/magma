variables:
  # The GIT_DEPTH option makes the project clone process in each job a bit faster, pulling only the current commit, not the whole Git history.
  GIT_DEPTH: "1"
  # overlay2 filesystem for the Docker build, which is faster and less space consuming
  DOCKER_DRIVER: overlay2
  # Abilita debug gitlab-ci
  #CI_DEBUG_TRACE: "true"

default:
  tags:
    - maggioli-network

stages:
  - build
  - build:isolate
  - test
  - publish
  - deploy:storybook # TODO
  - deploy:website # TODO

.push-ds-base:
  stage: publish
  variables:
    DOCKER_HOST: 'tcp://docker:2375'
    CI_IMAGE_NAME: designsystem
    CI_IMAGE_TAG: $CI_REGISTRY/$CI_IMAGE_NAME:${CI_COMMIT_SHORT_SHA}
  script:
    - echo $CI_REGISTRY_PSW | docker login -u $CI_REGISTRY_USR --password-stdin https://$CI_REGISTRY
    - docker build -t $CI_IMAGE_TAG .
    - docker push $CI_IMAGE_TAG

.push-ds-prod:
  extends: .push-ds-base
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"



.deploy-prod:
  extends: .deploy-ds-base
  variables:
    SERVER: $CI_SERVER_IP
    SSH_PRIV_KEY: $CI_SSH_PRIV_KEY
    SSH_USER: $CI_SSH_USER
    ENV: prod
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

include:
  - '/projects/stencil/.gitlab-ci.yml'
