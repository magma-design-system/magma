version: '3.1'

services:

  storybook:
    build:
      context: ./
      dockerfile: ./Dockerfile
    restart: unless-stopped
    container_name: storybook
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/sites/:/etc/nginx/sites-available
    expose:
      - "443"
    environment:
      - VIRTUAL_HOST=storybook.maggiolicloud.it
      - CERT_NAME=shared
    
networks: 
  default: 
    external: 
      name: nginx-proxy

