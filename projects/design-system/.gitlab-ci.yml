designsystem-build:
  stage: build
  before_script:
    - cd projects/design-system
  variables:
    CI_IMAGE_NAME: designsystem
    CI_IMAGE_TAG: $CI_REGISTRY/$CI_IMAGE_NAME:${CI_COMMIT_SHORT_SHA}
  script:
    - echo $CI_REGISTRY_PSW | docker login -u $CI_REGISTRY_USR --password-stdin https://$CI_REGISTRY
    - docker build -t $CI_IMAGE_TAG .
  only:
    refs: ["dev", "master", "merge_requests"]
    changes: ["*", "projects/design-system/**/*"]

designsystem-push:
  stage: push
  variables:
    GIT_STRATEGY: none
    CI_IMAGE_NAME: designsystem
    CI_IMAGE_TAG: $CI_REGISTRY/$CI_IMAGE_NAME:${CI_COMMIT_SHORT_SHA}
    CI_IMAGE_PROD_TAG: $CI_REGISTRY/$CI_IMAGE_NAME:${CI_COMMIT_TAG}
  script:
    - echo $CI_REGISTRY_PSW | docker login -u $CI_REGISTRY_USR --password-stdin https://$CI_REGISTRY
    - docker push $CI_IMAGE_TAG
    - if [ -n "$CI_COMMIT_TAG" ]; then docker tag $CI_IMAGE_TAG $CI_IMAGE_PROD_TAG; fi
    - if [ -n "$CI_COMMIT_TAG" ]; then docker push $CI_IMAGE_PROD_TAG; fi
  only:
    refs:
      - master
    changes:
      - "*"
      - "projects/design-system/**/*"

design-system-deploy-prod:
  image: ${KUBE_HELM_IMAGE}
  stage: deploy
  when: manual
  variables:
    KUBECONFIG: /etc/deploy/config
    CI_IMAGE_NAME: designsystem
  before_script:
    - mkdir -p /etc/deploy
    - echo ${CI_KUBE_CONFIG} | base64 -d > ${KUBECONFIG}
    - kubectl config use-context ${CI_KUBE_CONTEXT_PROD}
    - cd projects/design-system
    - helm dep update .helm/
  script:
    - helm upgrade -i ${CI_IMAGE_NAME} .helm/
      --create-namespace
      --namespace ${CI_K8S_PROD_NAMESPACE}
      --set image.repository=${CI_REGISTRY}/${CI_IMAGE_NAME}
      --set image.tag=${CI_COMMIT_SHORT_SHA}
      --set ingress.enabled=true
      --set ingress.hosts[0]=${CI_APP_DOMAIN_PROD}
      --set ingress.tls[0].hosts[0]=${CI_APP_DOMAIN_PROD}
  environment:
    name: production
    url: https://${CI_APP_DOMAIN_PROD}
  only:
    refs:
      - master
    changes:
      - "*"
      - "projects/design-system/**/*"



image: busybox:latest

deploy-storybook:
  stage: deploy
  image: kroniak/ssh-client
  variables:
    DEPLOY_FOLDER: $CI_DEPLOY_PATH
    SERVER: $CI_SERVER_IP
  script:
    - chmod +x ./.deploy/deploy-storybook.sh
    - ./.deploy/deploy-storybook.sh
  environment:
    name: DeployWebApp
    url: $CI_PRODUCTION_URL
  allow_failure: false
  when: manual
  only:
    refs:
      - master
