server {

    listen 80 default_server;
    listen [::]:80 default_server ipv6only=on;

    server_name _;
    root /var/www/html;
    index index.php index.html index.htm;

    location / {
        root /var/www/html/gatsby;
        try_files $uri $uri/ /index.html;
    }

    location ~ ^/storybook {
        root /var/www/html/storybook; # the directory (/storybook) will be appended to this, so don't include it in the root otherwise it'll look for /var/www/html/storybook/storybook
        try_files $uri $uri/ /index.html; # try_files will need to be relative to root
    }

    location ~ /\.ht {
        deny all;
    }
}
