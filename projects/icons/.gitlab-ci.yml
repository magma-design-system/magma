# ICONS BUILD
icons-build:
  extends: .base-build
  script:
    - nx run icons:build
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" || $CI_COMMIT_BRANCH =~ /^(dev|main|pipeline)$/
      changes:
        - projects/icons/**/*

# ICONS PUBLISH TEST
icons-publish-test:
  extends: .base-publish-test
  stage: test
  variables:
    BUILD_DIR: projects/icons
    PACK_NAME: maggioli-design-system-icons-*.tgz
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" || $CI_COMMIT_BRANCH =~ /^(main|pipeline)$/
      changes:
        - projects/icons/**/*

# ICONS PUBLISH
icons-publish:
  extends: .base-publish
  stage: publish
  variables:
    BUILD_DIR: projects/icons
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - projects/icons/**/*
