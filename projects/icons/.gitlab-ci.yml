# ICONS BUILD
icons-build:
  extends: .base-build
  script:
    - nx run svg-icons:build
    - nx run icons:build
  artifacts:
    name: icons-build
    expire_in: 1 day
    paths:
      - projects/icons/dist
      - projects/svg-icons/dist
  cache:
    policy: pull-push
  rules:
    - if: $CI_COMMIT_BRANCH
      changes:
        - projects/icons/**/*

# ICONS PUBLISH TEST
icons-publish-test:
  extends: .base-publish-test
  dependencies: [icons-build]
  variables:
    BUILD_DIR: projects/icons
    COMPONENT: icons
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - projects/icons/package.json

# ICONS PUBLISH
icons-publish:
  extends: .base-publish
  dependencies: [icons-build]
  needs: [icons-publish-test, icons-build]
  stage: publish
  variables:
    BUILD_DIR: projects/icons
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - projects/icons/package.json

# ICONS INSTALL TEST
icons-install-test:
  extends: .base-install-test
  needs: [icons-publish]
  variables:
    BUILD_DIR: projects/icons
    COMPONENT: icons
    PACK_NAME: maggioli-design-system-icons-*.tgz
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - projects/icons/package.json
