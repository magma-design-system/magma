.base-input-switch-group:
  variables:
    COMPONENT: mds-input-switch-group

# BUILD
input-switch-group-build:
  extends: [.base-build, .base-input-switch-group]

# ISOLATE
input-switch-group-isolate:
  extends: [.base-isolate, .base-input-switch-group]
  dependencies: [input-switch-group-build]

# TEST
input-switch-group-stencil-test:
  extends: [.base-stencil-test, .base-input-switch-group]
  dependencies: [input-switch-group-build, input-switch-group-isolate]

input-switch-group-publish-test:
  extends: [.base-publish-test, .base-input-switch-group]
  dependencies: [input-switch-group-build, input-switch-group-isolate]

# PUBLISH
input-switch-group-publish:
  extends: [.base-publish, .base-input-switch-group]
  dependencies: [input-switch-group-build, input-switch-group-isolate]
