.base-accordion:
  variables:
    COMPONENT: mds-accordion

# TEST
accordion-publish-test:
  extends: [.base-stencil-publish-test, .base-accordion]
  dependencies: [base-stencil-build, base-isolate]

# PUBLISH
accordion-publish:
  extends: [.base-stencil-publish, .base-accordion]
  dependencies: [base-stencil-build, base-isolate]
  needs: [base-stencil-build, base-isolate, accordion-publish-test]

# INSTALL TEST
accordion-install-test:
  extends: [.base-stencil-install-test, .base-accordion]
  dependencies: [base-stencil-build, base-isolate]
  needs: [base-stencil-build, base-isolate, accordion-publish]
