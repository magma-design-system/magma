.base-accordion:
  variables:
    COMPONENT: mds-accordion

# ISOLATE
accordion-isolate:
  extends: [.base-isolate, .base-accordion]
  dependencies: [base-stencil-build]

# TEST
accordion-publish-test:
  extends: [.base-stencil-publish-test, .base-accordion]
  dependencies: [base-stencil-build, accordion-isolate]

# PUBLISH
accordion-publish:
  extends: [.base-stencil-publish, .base-accordion]
  dependencies: [base-stencil-build, accordion-isolate]
  needs: [base-stencil-build, accordion-isolate, accordion-publish-test]

# INSTALL TEST
accordion-install-test:
  extends: [.base-stencil-install-test, .base-accordion]
  needs: [accordion-publish]

