.base-usage:
  variables:
    COMPONENT: mds-usage

# TEST
usage-publish-test:
  extends: [.base-stencil-publish-test, .base-usage]
  dependencies: [base-stencil-build, base-isolate]

# PUBLISH
usage-publish:
  extends: [.base-stencil-publish, .base-usage]
  dependencies: [base-stencil-build, base-isolate]
  needs: [base-stencil-build, base-isolate, usage-publish-test]

# INSTALL TEST
usage-install-test:
  extends: [.base-stencil-install-test, .base-usage]
  dependencies: [base-stencil-build, base-isolate]
  needs: [base-stencil-build, base-isolate, usage-publish]
