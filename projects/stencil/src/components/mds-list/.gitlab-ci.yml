.base-list:
  variables:
    COMPONENT: mds-list

# ISOLATE
list-isolate:
  extends: [.base-isolate, .base-list]
  dependencies: [base-stencil-build]

# PUBLISH
list-publish:
  extends: [.base-stencil-publish, .base-list]
  dependencies: [base-stencil-build, list-isolate]
  needs: [base-stencil-build, list-isolate, list-publish-test]

# INSTALL TEST
list-install-test:
  extends: [.base-stencil-install-test, .base-list]
  dependencies: [base-stencil-build, list-isolate]
  needs: [base-stencil-build, list-isolate, list-publish]
