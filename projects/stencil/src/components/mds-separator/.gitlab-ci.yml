.base-separator:
  variables:
    COMPONENT: mds-separator

# TEST
separator-publish-test:
  extends: [.base-stencil-publish-test, .base-separator]
  dependencies: [base-stencil-build, base-isolate]

# PUBLISH
separator-publish:
  extends: [.base-stencil-publish, .base-separator]
  dependencies: [base-stencil-build, base-isolate]
  needs: [base-stencil-build, base-isolate, separator-publish-test]

# INSTALL TEST
separator-install-test:
  extends: [.base-stencil-install-test, .base-separator]
  dependencies: [base-stencil-build, base-isolate]
  needs: [base-stencil-build, base-isolate, separator-publish]
