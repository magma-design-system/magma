.base-push-notifications:
  variables:
    COMPONENT: mds-push-notifications

# ISOLATE
push-notifications-isolate:
  extends: [.base-isolate, .base-push-notifications]
  dependencies: [base-stencil-build]

# PUBLISH
push-notifications-publish:
  extends: [.base-stencil-publish, .base-push-notifications]
  dependencies: [base-stencil-build, push-notifications-isolate]
  needs: [base-stencil-build, push-notifications-isolate, push-notifications-publish-test]

# INSTALL TEST
push-notifications-install-test:
  extends: [.base-stencil-install-test, .base-push-notifications]
  dependencies: [base-stencil-build, push-notifications-isolate]
  needs: [base-stencil-build, push-notifications-isolate, push-notifications-publish]
