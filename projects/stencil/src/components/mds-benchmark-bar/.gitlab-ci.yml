.base-benchmark-bar:
  variables:
    COMPONENT: mds-benchmark-bar

# TEST
benchmark-bar-publish-test:
  extends: [.base-stencil-publish-test, .base-benchmark-bar]
  dependencies: [base-stencil-build, base-isolate]

# PUBLISH
benchmark-bar-publish:
  extends: [.base-stencil-publish, .base-benchmark-bar]
  dependencies: [base-stencil-build, base-isolate]
  needs: [base-stencil-build, base-isolate, benchmark-bar-publish-test]

# INSTALL TEST
benchmark-bar-install-test:
  extends: [.base-stencil-install-test, .base-benchmark-bar]
  dependencies: [base-stencil-build, base-isolate]
  needs: [base-stencil-build, base-isolate, benchmark-bar-publish]
