.base-card-content:
  variables:
    COMPONENT: mds-card-content

# TEST
card-content-publish-test:
  extends: [.base-stencil-publish-test, .base-card-content]
  dependencies: [base-stencil-build, base-isolate]

# PUBLISH
card-content-publish:
  extends: [.base-stencil-publish, .base-card-content]
  dependencies: [base-stencil-build, base-isolate]
  needs: [base-stencil-build, base-isolate, card-content-publish-test]

# INSTALL TEST
card-content-install-test:
  extends: [.base-stencil-install-test, .base-card-content]
  dependencies: [base-stencil-build, base-isolate]
  needs: [base-stencil-build, base-isolate, card-content-publish]
