.base-details:
  variables:
    COMPONENT: mds-details

# TEST
details-publish-test:
  extends: [.base-stencil-publish-test, .base-details]
  dependencies: [base-stencil-build, base-isolate]

# PUBLISH
details-publish:
  extends: [.base-stencil-publish, .base-details]
  dependencies: [base-stencil-build, base-isolate]
  needs: [base-stencil-build, base-isolate, details-publish-test]

# INSTALL TEST
details-install-test:
  extends: [.base-stencil-install-test, .base-details]
  dependencies: [base-stencil-build, base-isolate]
  needs: [base-stencil-build, base-isolate, details-publish]
