.base-breadcrumb-item:
  variables:
    COMPONENT: mds-breadcrumb-item

# TEST
breadcrumb-item-publish-test:
  extends: [.base-stencil-publish-test, .base-breadcrumb-item]
  dependencies: [base-stencil-build, base-isolate]

# PUBLISH
breadcrumb-item-publish:
  extends: [.base-stencil-publish, .base-breadcrumb-item]
  dependencies: [base-stencil-build, base-isolate]
  needs: [base-stencil-build, base-isolate, breadcrumb-item-publish-test]

# INSTALL TEST
breadcrumb-item-install-test:
  extends: [.base-stencil-install-test, .base-breadcrumb-item]
  dependencies: [base-stencil-build, base-isolate]
  needs: [base-stencil-build, base-isolate, breadcrumb-item-publish]
