.base-filter-item:
  variables:
    COMPONENT: mds-filter-item

# TEST
filter-item-publish-test:
  extends: [.base-stencil-publish-test, .base-filter-item]
  dependencies: [base-stencil-build, base-isolate]

# PUBLISH
filter-item-publish:
  extends: [.base-stencil-publish, .base-filter-item]
  dependencies: [base-stencil-build, base-isolate]
  needs: [base-stencil-build, base-isolate, filter-item-publish-test]

# INSTALL TEST
filter-item-install-test:
  extends: [.base-stencil-install-test, .base-filter-item]
  dependencies: [base-stencil-build, base-isolate]
  needs: [base-stencil-build, base-isolate, filter-item-publish]
