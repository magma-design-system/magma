.base-button:
  variables:
    COMPONENT: mds-button

# TEST
button-publish-test:
  extends: [.base-stencil-publish-test, .base-button]
  dependencies: [base-stencil-build, base-isolate]

# PUBLISH
button-publish:
  extends: [.base-stencil-publish, .base-button]
  dependencies: [base-stencil-build, base-isolate]
  needs: [base-stencil-build, base-isolate, button-publish-test]

# INSTALL TEST
button-install-test:
  extends: [.base-stencil-install-test, .base-button]
  dependencies: [base-stencil-build, base-isolate]
  needs: [base-stencil-build, base-isolate, button-publish]
