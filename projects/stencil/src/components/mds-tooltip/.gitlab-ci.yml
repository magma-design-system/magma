.base-tooltip:
  variables:
    COMPONENT: mds-tooltip

# TEST
tooltip-publish-test:
  extends: [.base-stencil-publish-test, .base-tooltip]
  dependencies: [base-stencil-build, base-isolate]

# PUBLISH
tooltip-publish:
  extends: [.base-stencil-publish, .base-tooltip]
  dependencies: [base-stencil-build, base-isolate]
  needs: [base-stencil-build, base-isolate, tooltip-publish-test]

# INSTALL TEST
tooltip-install-test:
  extends: [.base-stencil-install-test, .base-tooltip]
  dependencies: [base-stencil-build, base-isolate]
  needs: [base-stencil-build, base-isolate, tooltip-publish]
