.base-author:
  variables:
    COMPONENT: mds-author

# ISOLATE
author-isolate:
  extends: [.base-isolate, .base-author]
  dependencies: [base-stencil-build]

# TEST
author-publish-test:
  extends: [.base-stencil-publish-test, .base-author]
  dependencies: [base-stencil-build, author-isolate]

# PUBLISH
author-publish:
  extends: [.base-stencil-publish, .base-author]
  dependencies: [base-stencil-build, author-isolate]
  needs: [base-stencil-build, author-isolate, author-publish-test]
