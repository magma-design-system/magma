.base-input-field:
  variables:
    COMPONENT: mds-input-field

# ISOLATE
input-field-isolate:
  extends: [.base-isolate, .base-input-field]
  dependencies: [base-stencil-build]

# TEST
input-field-publish-test:
  extends: [.base-stencil-publish-test, .base-input-field]
  dependencies: [base-stencil-build, input-field-isolate]

# PUBLISH
input-field-publish:
  extends: [.base-stencil-publish, .base-input-field]
  dependencies: [base-stencil-build, input-field-isolate]
  needs: [base-stencil-build, input-field-isolate, input-field-publish-test]

# INSTALL TEST
input-field-install-test:
  extends: [.base-stencil-install-test, .base-input-field]
  dependencies: [base-stencil-build, input-field-isolate]
  needs: [base-stencil-build, input-field-isolate, input-field-publish]
