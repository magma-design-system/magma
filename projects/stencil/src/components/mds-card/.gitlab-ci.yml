.base-card:
  variables:
    COMPONENT: mds-card

# TEST
card-publish-test:
  extends: [.base-stencil-publish-test, .base-card]
  dependencies: [base-stencil-build, base-isolate]

# PUBLISH
card-publish:
  extends: [.base-stencil-publish, .base-card]
  dependencies: [base-stencil-build, base-isolate]
  needs: [base-stencil-build, base-isolate, card-publish-test]

# INSTALL TEST
card-install-test:
  extends: [.base-stencil-install-test, .base-card]
  dependencies: [base-stencil-build, base-isolate]
  needs: [base-stencil-build, base-isolate, card-publish]
