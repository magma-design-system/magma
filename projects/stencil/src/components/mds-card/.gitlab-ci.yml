.base-card:
  variables:
    COMPONENT: mds-card

# ISOLATE
card-isolate:
  extends: [.base-isolate, .base-card]
  dependencies: [base-stencil-build]

# TEST
card-publish-test:
  extends: [.base-stencil-publish-test, .base-card]
  dependencies: [base-stencil-build, card-isolate]

# PUBLISH
card-publish:
  extends: [.base-stencil-publish, .base-card]
  dependencies: [base-stencil-build, card-isolate]
  needs: [base-stencil-build, card-isolate, card-publish-test]

# INSTALL TEST
card-install-test:
  extends: [.base-stencil-install-test, .base-card]
  dependencies: [card-publish, card-isolate]
