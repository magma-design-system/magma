.base-pref-consumption:
  variables:
    COMPONENT: mds-pref-consumption

# TEST
pref-consumption-publish-test:
  extends: [.base-stencil-publish-test, .base-pref-consumption]
  dependencies: [base-stencil-build, base-isolate]

# PUBLISH
pref-consumption-publish:
  extends: [.base-stencil-publish, .base-pref-consumption]
  dependencies: [base-stencil-build, base-isolate]
  needs: [base-stencil-build, base-isolate, pref-consumption-publish-test]

# INSTALL TEST
pref-consumption-install-test:
  extends: [.base-stencil-install-test, .base-pref-consumption]
  dependencies: [base-stencil-build, base-isolate]
  needs: [base-stencil-build, base-isolate, pref-consumption-publish]
