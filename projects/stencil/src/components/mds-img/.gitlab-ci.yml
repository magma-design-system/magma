.base-img:
  variables:
    COMPONENT: mds-img

# TEST
img-publish-test:
  extends: [.base-stencil-publish-test, .base-img]
  dependencies: [base-stencil-build, base-isolate]

# PUBLISH
img-publish:
  extends: [.base-stencil-publish, .base-img]
  dependencies: [base-stencil-build, base-isolate]
  needs: [base-stencil-build, base-isolate, img-publish-test]

# INSTALL TEST
img-install-test:
  extends: [.base-stencil-install-test, .base-img]
  dependencies: [base-stencil-build, base-isolate]
  needs: [base-stencil-build, base-isolate, img-publish]
