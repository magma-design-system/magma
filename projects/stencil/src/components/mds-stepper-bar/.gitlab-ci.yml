.base-stepper-bar:
  variables:
    COMPONENT: mds-stepper-bar

# ISOLATE
stepper-bar-isolate:
  extends: [.base-isolate, .base-stepper-bar]
  dependencies: [base-stencil-build]

# TEST
stepper-bar-publish-test:
  extends: [.base-stencil-publish-test, .base-stepper-bar]
  dependencies: [base-stencil-build, stepper-bar-isolate]

# PUBLISH
stepper-bar-publish:
  extends: [.base-stencil-publish, .base-stepper-bar]
  dependencies: [base-stencil-build, stepper-bar-isolate]
  needs: [base-stencil-build, stepper-bar-isolate, stepper-bar-publish-test]

# INSTALL TEST
stepper-bar-install-test:
  extends: [.base-stencil-install-test, .base-stepper-bar]
  needs: [stepper-bar-publish]

