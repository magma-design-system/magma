.base-breadcrumb:
  variables:
    COMPONENT: mds-breadcrumb

# TEST
breadcrumb-publish-test:
  extends: [.base-stencil-publish-test, .base-breadcrumb]
  dependencies: [base-stencil-build, base-isolate]

# PUBLISH
breadcrumb-publish:
  extends: [.base-stencil-publish, .base-breadcrumb]
  dependencies: [base-stencil-build, base-isolate]
  needs: [base-stencil-build, base-isolate, breadcrumb-publish-test]

# INSTALL TEST
breadcrumb-install-test:
  extends: [.base-stencil-install-test, .base-breadcrumb]
  dependencies: [base-stencil-build, base-isolate]
  needs: [base-stencil-build, base-isolate, breadcrumb-publish]
