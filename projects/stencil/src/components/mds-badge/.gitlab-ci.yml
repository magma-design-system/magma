.base-badge:
  variables:
    COMPONENT: mds-badge

# TEST
badge-publish-test:
  extends: [.base-stencil-publish-test, .base-badge]
  dependencies: [base-stencil-build, base-isolate]

# PUBLISH
badge-publish:
  extends: [.base-stencil-publish, .base-badge]
  dependencies: [base-stencil-build, base-isolate]
  needs: [base-stencil-build, base-isolate, badge-publish-test]

# INSTALL TEST
badge-install-test:
  extends: [.base-stencil-install-test, .base-badge]
  dependencies: [base-stencil-build, base-isolate]
  needs: [base-stencil-build, base-isolate, badge-publish]
