.base-icon:
  variables:
    COMPONENT: mds-icon

# BUILD
icon-build:
  extends: [.base-build, .base-icon]

# ISOLATE
icon-isolate:
  extends: [.base-isolate, .base-icon]
  dependencies: [icon-build]

# TEST
icon-stencil-test:
  extends: [.base-stencil-test, .base-icon]
  dependencies: [icon-build, icon-isolate]

icon-publish-test:
  extends: [.base-publish-test, .base-icon]
  dependencies: [icon-build, icon-isolate]

# PUBLISH
icon-publish:
  extends: [.base-publish, .base-icon]
  dependencies: [icon-build, icon-isolate]
