.base-pref-language:
  variables:
    COMPONENT: mds-pref-language

# TEST
pref-language-publish-test:
  extends: [.base-stencil-publish-test, .base-pref-language]
  dependencies: [base-stencil-build, base-isolate]

# PUBLISH
pref-language-publish:
  extends: [.base-stencil-publish, .base-pref-language]
  dependencies: [base-stencil-build, base-isolate]
  needs: [base-stencil-build, base-isolate, pref-language-publish-test]

# INSTALL TEST
pref-language-install-test:
  extends: [.base-stencil-install-test, .base-pref-language]
  dependencies: [base-stencil-build, base-isolate]
  needs: [base-stencil-build, base-isolate, pref-language-publish]
