.base-table-header:
  variables:
    COMPONENT: mds-table-header

# TEST
table-header-publish-test:
  extends: [.base-stencil-publish-test, .base-table-header]
  dependencies: [base-stencil-build, base-isolate]

# PUBLISH
table-header-publish:
  extends: [.base-stencil-publish, .base-table-header]
  dependencies: [base-stencil-build, base-isolate]
  needs: [base-stencil-build, base-isolate, table-header-publish-test]

# INSTALL TEST
table-header-install-test:
  extends: [.base-stencil-install-test, .base-table-header]
  dependencies: [base-stencil-build, base-isolate]
  needs: [base-stencil-build, base-isolate, table-header-publish]
