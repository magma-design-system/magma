.base-banner:
  variables:
    COMPONENT: mds-banner

# TEST
banner-publish-test:
  extends: [.base-stencil-publish-test, .base-banner]
  dependencies: [base-stencil-build, base-isolate]

# PUBLISH
banner-publish:
  extends: [.base-stencil-publish, .base-banner]
  dependencies: [base-stencil-build, base-isolate]
  needs: [base-stencil-build, base-isolate, banner-publish-test]

# INSTALL TEST
banner-install-test:
  extends: [.base-stencil-install-test, .base-banner]
  dependencies: [base-stencil-build, base-isolate]
  needs: [base-stencil-build, base-isolate, banner-publish]
