.base-header:
  variables:
    COMPONENT: mds-header

# TEST
header-publish-test:
  extends: [.base-stencil-publish-test, .base-header]
  dependencies: [base-stencil-build, base-isolate]

# PUBLISH
header-publish:
  extends: [.base-stencil-publish, .base-header]
  dependencies: [base-stencil-build, base-isolate]
  needs: [base-stencil-build, base-isolate, header-publish-test]

# INSTALL TEST
header-install-test:
  extends: [.base-stencil-install-test, .base-header]
  dependencies: [base-stencil-build, base-isolate]
  needs: [base-stencil-build, base-isolate, header-publish]
