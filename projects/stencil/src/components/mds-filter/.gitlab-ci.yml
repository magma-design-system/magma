.base-filter:
  variables:
    COMPONENT: mds-filter

# TEST
filter-publish-test:
  extends: [.base-stencil-publish-test, .base-filter]
  dependencies: [base-stencil-build, base-isolate]

# PUBLISH
filter-publish:
  extends: [.base-stencil-publish, .base-filter]
  dependencies: [base-stencil-build, base-isolate]
  needs: [base-stencil-build, base-isolate, filter-publish-test]

# INSTALL TEST
filter-install-test:
  extends: [.base-stencil-install-test, .base-filter]
  dependencies: [base-stencil-build, base-isolate]
  needs: [base-stencil-build, base-isolate, filter-publish]
