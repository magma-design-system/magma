.base-spinner:
  variables:
    COMPONENT: mds-spinner

# TEST
spinner-publish-test:
  extends: [.base-stencil-publish-test, .base-spinner]
  dependencies: [base-stencil-build, base-isolate]

# PUBLISH
spinner-publish:
  extends: [.base-stencil-publish, .base-spinner]
  dependencies: [base-stencil-build, base-isolate]
  needs: [base-stencil-build, base-isolate, spinner-publish-test]

# INSTALL TEST
spinner-install-test:
  extends: [.base-stencil-install-test, .base-spinner]
  dependencies: [base-stencil-build, base-isolate]
  needs: [base-stencil-build, base-isolate, spinner-publish]
