.base-toast:
  variables:
    COMPONENT: mds-toast

# TEST
toast-publish-test:
  extends: [.base-stencil-publish-test, .base-toast]
  dependencies: [base-stencil-build, base-isolate]

# PUBLISH
toast-publish:
  extends: [.base-stencil-publish, .base-toast]
  dependencies: [base-stencil-build, base-isolate]
  needs: [base-stencil-build, base-isolate, toast-publish-test]

# INSTALL TEST
toast-install-test:
  extends: [.base-stencil-install-test, .base-toast]
  dependencies: [base-stencil-build, base-isolate]
  needs: [base-stencil-build, base-isolate, toast-publish]
