.base-input:
  variables:
    COMPONENT: mds-input

# TEST
input-publish-test:
  extends: [.base-stencil-publish-test, .base-input]
  dependencies: [base-stencil-build, base-isolate]

# PUBLISH
input-publish:
  extends: [.base-stencil-publish, .base-input]
  dependencies: [base-stencil-build, base-isolate]
  needs: [base-stencil-build, base-isolate, input-publish-test]

# INSTALL TEST
input-install-test:
  extends: [.base-stencil-install-test, .base-input]
  dependencies: [base-stencil-build, base-isolate]
  needs: [base-stencil-build, base-isolate, input-publish]
