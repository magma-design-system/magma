.base-file:
  variables:
    COMPONENT: mds-file

# TEST
file-publish-test:
  extends: [.base-stencil-publish-test, .base-file]
  dependencies: [base-stencil-build, base-isolate]

# PUBLISH
file-publish:
  extends: [.base-stencil-publish, .base-file]
  dependencies: [base-stencil-build, base-isolate]
  needs: [base-stencil-build, base-isolate, file-publish-test]

# INSTALL TEST
file-install-test:
  extends: [.base-stencil-install-test, .base-file]
  dependencies: [base-stencil-build, base-isolate]
  needs: [base-stencil-build, base-isolate, file-publish]
