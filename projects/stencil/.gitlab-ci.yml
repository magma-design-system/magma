# COMMON STENCIL BUILD
base-stencil-build:
  extends: .base-build
  script:
    - nx run design-tokens:build
    - nx run styles:build
    - nx run svg-icons:build
    - nx run icons:build
    - nx run stencil:build
  artifacts:
    name: stencil-build
    expire_in: 1 day
    paths:
      - projects/design-tokens/dist
      - projects/design-tokens/config
      - projects/design-tokens/properties
      - projects/styles/dist
      - projects/svg-icons/dist
      - projects/icons/dist
      - projects/stencil/dist
      - projects/stencil/src/components.d.ts
      - projects/stencil/src/fixtures
      - projects/stencil/www
      - projects/stencil/assets
      - projects/stencil/react/src
      - projects/stencil/loader
      - projects/stencil/angular/magma-angular/src/stencil-generated
  cache:
    policy: pull-push
  rules:
    - if: $CI_COMMIT_BRANCH
      changes:
        - projects/stencil/**/*
        - .deploy/**/*

stencil-storybook-build:
  extends: .base-build
  stage: build:storybook
  dependencies: [base-stencil-build]
  needs: [base-stencil-build]
  script:
    - nx run stencil:storybook.build
  artifacts:
    name: stencil-storybook-build
    expire_in: 1 day
    paths:
      - projects/stencil/dist-storybook
  cache:
    policy: pull-push
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
      changes:
        - projects/stencil/**/*
        - .deploy/**/*

# COMMON STENCIL TEST
stencil-test:
  extends: .base-test
  image: timbru31/node-chrome
  dependencies: [base-stencil-build]
  before_script:
  # workaround for test e2e when update stencil to version above 4.23.0
  # https://pptr.dev/troubleshooting#running-puppeteer-on-gitlabci
  # https://github.com/berstend/puppeteer-extra/issues/876#issuecomment-2011103235
    - apt update && apt install -yq jq gconf-service libasound2 libatk1.0-0 libc6 libcairo2
      libcups2 libdbus-1-3 libexpat1 libfontconfig1 libgbm1 libgcc1 libgconf-2-4
      libgdk-pixbuf2.0-0 libglib2.0-0 libgtk-3-0 libnspr4 libpango-1.0-0
      libpangocairo-1.0-0 libstdc++6 libx11-6 libx11-xcb1 libxcb1 libxcomposite1
      libxcursor1 libxdamage1 libxext6 libxfixes3 libxi6 libxrandr2 libxrender1
      libxss1 libxtst6 libvulkan1 ca-certificates fonts-liberation libnss3 lsb-release
      xdg-utils wget
    - wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
    - dpkg -i google-chrome-stable_current_amd64.deb;\
    - npm install -g --force nx yarn
    - yarn install --frozen-lockfile --prefer-offline
  variables:
    BUILD_DIR: projects/stencil
  rules:
    - if: $CI_COMMIT_BRANCH
      changes:
        - projects/stencil/**/*

# MAGMA PUBLISH TEST
magma-publish-test:
  extends: .base-publish-test
  variables:
    BUILD_DIR: projects/stencil
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - projects/stencil/package.json

# MAGMA PUBLISH
magma-publish:
  extends: .base-publish
  dependencies: [base-stencil-build]
  needs: [magma-publish-test, base-stencil-build]
  stage: publish
  variables:
    BUILD_DIR: projects/stencil
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - projects/stencil/package.json

# MAGMA INSTALL TEST
magma-install-test:
  extends: .base-install-test
  needs: [magma-publish]
  variables:
    BUILD_DIR: projects/stencil
    PACK_NAME: maggioli-design-system-magma-*.tgz
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - projects/stencil/package.json

include:
  - '/projects/stencil/react/.gitlab-ci.yml'
  - '/projects/stencil/angular/.gitlab-ci.yml'
  - '/projects/stencil/src/components/.gitlab-ci.yml'
