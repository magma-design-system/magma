# COMMON STENCIL BUILD
base-stencil-build:
  extends: .base-build
  variables:
    COMPONENT: to_be_extended
    BUILD_DIR: projects/stencil/.build/$COMPONENT
  script:
    - nx run design-tokens:build
    - nx run styles:build
    - nx run icons:build
    - nx run stencil:build
  artifacts:
    name: stencil-build
    expire_in: 1 day
    paths:
      - projects/design-tokens/dist
      - projects/design-tokens/config
      - projects/design-tokens/properties
      - projects/styles/dist
      - projects/icons/dist
      - projects/stencil/dist
      - projects/stencil/assets/svg
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" || $CI_COMMIT_BRANCH =~ /^(dev|main|pipeline)$/
      changes:
        - projects/stencil/**/*

stencil-storybook-build:
  extends: .base-build
  stage: build:storybook
  dependencies: [base-stencil-build]
  script:
    - nx run stencil:storybook.build
  artifacts:
    name: stencil-storybook-build
    expire_in: 1 day
    paths:
      - projects/stencil/dist-storybook
  rules:
    - if: $CI_COMMIT_BRANCH =~ /^(dev|pipeline)$/

# BASE ISOLATE
.base-isolate:
  extends: base-stencil-build
  stage: build:isolate
  script:
    - nx run stencil:publish.isolate.component --component=$COMPONENT
  artifacts:
    name: $COMPONENT-stencil-build
    expire_in: 1 day
    paths:
      - $BUILD_DIR
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" || $CI_COMMIT_BRANCH =~ /^(dev|main|pipeline)$/
      changes:
        - projects/stencil/src/components/$COMPONENT/**/*

# COMMON STENCIL TEST
stencil-test:
  extends: base-stencil-build
  image: atools/chrome-headless:java11-node16-latest
  stage: test
  script:
    - cd projects/stencil
    - npm run test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" || $CI_COMMIT_BRANCH =~ /^(dev|main|pipeline)$/
      changes:
        - projects/stencil/**/*

# BASE STENCIL PUBLISH TEST
.base-stencil-publish-test:
  extends: .base-publish-test
  dependencies: [base-stencil-build]
  stage: test
  variables:
    BUILD_DIR: projects/stencil/.build/$COMPONENT
    PACK_NAME: maggioli-design-system-${COMPONENT}-*.tgz
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" || $CI_COMMIT_BRANCH =~ /^(main|pipeline)$/
      changes:
        - projects/stencil/src/components/$COMPONENT/**/*

# BASE STENCIL PUBLISH
.base-stencil-publish:
  extends: .base-publish
  dependencies: [base-stencil-build]
  stage: publish
  variables:
    BUILD_DIR: projects/stencil/.build/$COMPONENT
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - projects/stencil/src/components/$COMPONENT/**/*

