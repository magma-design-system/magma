server {

    listen 80 default_server;
    listen [::]:80 default_server ipv6only=on;

    server_name _;
    root /usr/share/nginx/html;
    index index.php index.html index.htm;

   location / {
      proxy_pass http://magmadocs_nextjs:3000;
      proxy_http_version 1.1;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Server $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Host $http_host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "Upgrade";
      proxy_pass_request_headers on;
    }

    location ~ ^/storybook {
        root /usr/share/nginx/html; # the directory (/storybook) will be appended to this, so don't include it in the root otherwise it'll look for /var/www/html/storybook/storybook
        try_files $uri $uri/ /storybook/index.html; # try_files will need to be relative to root
    }

    location ~ /\.ht {
        deny all;
    }
}
