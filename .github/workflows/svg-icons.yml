name: svg-icons

on:
  push:
    branches: [main]
    paths:
      - 'projects/svg-icons/**'

jobs:
  pipeline:
    uses: ./.github/workflows/_package-pipeline.yml
    with:
      component: svg-icons
      publish-working-directory: projects/svg-icons
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
