# Release pipeline for @maggioli-design-system/magma (StencilJS web components).
# Detects the next version from conventional commits scoped to the Stencil
# project (magma, stencil, react, lit, storybook and any mds-* component),
# bumps projects/stencil/package.json and keeps the companion magma-react and
# magma-angular packages in lockstep at the same version. The version bump
# commit then triggers CI -> publish.yml (npm).
name: stencil release

on:
  push:
    branches: [main, beta]

concurrency:
  # per-branch: a stable (main) and a prerelease (beta) release don't serialize against each other
  group: release-magma-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    uses: ./.github/workflows/semantic-release.yml
    with:
      working-directory: projects/stencil
      tag-format: 'magma@${version}'
      commit-scope: magma|stencil|react|lit|storybook|mds-*
      version-sync-paths: |
        projects/stencil/react/package.json
        projects/stencil/angular/magma-angular/package.json
