# Reusable pipeline for publishing a workspace package to npm: build -> test -> publish.
# The publish job runs on main pushes only when the package.json changed, fails if the
# version was not bumped, dry-runs and then publishes to npm.
name: package-pipeline

on:
  workflow_call:
    inputs:
      nx-project:
        description: Nx project name to build (empty = no build job)
        type: string
        default: ''
      component:
        description: npm package name suffix (@maggioli-design-system/<component>)
        type: string
        required: true
      publish-working-directory:
        description: Directory where tests and npm publish run
        type: string
        required: true
      artifact-paths:
        description: Paths uploaded as build artifact (multiline)
        type: string
        default: ''
      artifact-download-path:
        description: Destination path when downloading the build artifact (least common ancestor of artifact-paths)
        type: string
        default: '.'
      package-json-filter:
        description: package.json path that gates the publish job when changed (default <publish-working-directory>/package.json)
        type: string
        default: ''
      run-tests:
        description: Run `npm run test` in publish-working-directory
        type: boolean
        default: false
      build-artifact-name:
        description: Artifact name to download (set without nx-project to reuse an artifact built by the caller)
        type: string
        default: ''
    secrets:
      NPM_TOKEN:
        required: true

env:
  # Chrome is only needed by the stencil e2e job (defined in stencil.yml)
  PUPPETEER_SKIP_DOWNLOAD: 'true'

jobs:
  build:
    if: ${{ inputs.nx-project != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn
      - name: Restore Nx cache
        uses: actions/cache@v4
        with:
          path: .nx
          key: nx-${{ hashFiles('yarn.lock') }}-${{ github.sha }}
          restore-keys: |
            nx-${{ hashFiles('yarn.lock') }}-
      - run: yarn install --frozen-lockfile --prefer-offline
      - run: yarn nx run ${{ inputs.nx-project }}:build
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.build-artifact-name || format('{0}-build', inputs.nx-project) }}
          path: ${{ inputs.artifact-paths }}
          retention-days: 1
          include-hidden-files: true

  test:
    needs: [build]
    if: >-
      ${{ !cancelled() && inputs.run-tests &&
          (needs.build.result == 'success' || needs.build.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn
      - run: yarn install --frozen-lockfile --prefer-offline
      - if: ${{ inputs.nx-project != '' || inputs.build-artifact-name != '' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.build-artifact-name || format('{0}-build', inputs.nx-project) }}
          path: ${{ inputs.artifact-download-path }}
      - working-directory: ${{ inputs.publish-working-directory }}
        run: npm run test

  publish:
    needs: [build, test]
    if: >-
      ${{ !cancelled() &&
          (needs.build.result == 'success' || needs.build.result == 'skipped') &&
          (needs.test.result == 'success' || needs.test.result == 'skipped') &&
          github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    concurrency: publish-${{ inputs.component }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect package.json changes
        if: ${{ github.event_name == 'push' }}
        uses: dorny/paths-filter@v3
        id: filter
        with:
          # compares against the commit before the push
          base: ${{ github.ref_name }}
          filters: |
            pkg:
              - '${{ inputs.package-json-filter || format('{0}/package.json', inputs.publish-working-directory) }}'
      - name: Decide whether to publish
        id: gate
        # manual dispatch always publishes (the version check still guards against republishing)
        run: echo "publish=${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.pkg == 'true' }}" >> "$GITHUB_OUTPUT"
      - if: ${{ steps.gate.outputs.publish == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn
      - if: ${{ steps.gate.outputs.publish == 'true' }}
        run: yarn install --frozen-lockfile --prefer-offline
      - if: ${{ steps.gate.outputs.publish == 'true' && (inputs.nx-project != '' || inputs.build-artifact-name != '') }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.build-artifact-name || format('{0}-build', inputs.nx-project) }}
          path: ${{ inputs.artifact-download-path }}
      - name: Check version and dry-run publish
        if: ${{ steps.gate.outputs.publish == 'true' }}
        working-directory: ${{ inputs.publish-working-directory }}
        run: |
          LATEST_PUBLISHED_V="$(npm view @maggioli-design-system/${{ inputs.component }} dist-tags.latest)"
          TO_BE_PUBLISHED_V="$(jq -r '.version' package.json)"
          echo "VERSION TO BE PUBLISHED ${TO_BE_PUBLISHED_V}"
          echo "LATEST PUBLISHED VERSION ${LATEST_PUBLISHED_V}"
          if [ "$LATEST_PUBLISHED_V" = "$TO_BE_PUBLISHED_V" ]; then
            echo "${LATEST_PUBLISHED_V} == ${TO_BE_PUBLISHED_V} : cannot publish!"
            exit 1
          fi
          npm publish --access public --dry-run
      - name: Publish to npm
        if: ${{ steps.gate.outputs.publish == 'true' }}
        working-directory: ${{ inputs.publish-working-directory }}
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
          npm publish --access public
