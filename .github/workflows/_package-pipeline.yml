# Reusable CI pipeline for a workspace package: change detection -> build -> test.
# Publishing to npm is handled by the dedicated publish workflow (publish.yml),
# which runs on main once every CI workflow of the commit has succeeded.
#
# Path filtering happens in the `changes` job instead of the caller's trigger:
# GitHub evaluates trigger `paths` only on the first 300 files of the diff, so
# big merges (e.g. dev -> main release PRs) silently skip workflows.
name: package-pipeline

on:
  workflow_call:
    inputs:
      path:
        description: Glob of the project files; build/test run only when they changed
        type: string
        required: true
      nx-project:
        description: Nx project name to build (empty = no build job)
        type: string
        default: ''
      artifact-paths:
        description: Paths uploaded as build artifact (multiline)
        type: string
        default: ''
      artifact-download-path:
        description: Destination path when downloading the build artifact (least common ancestor of artifact-paths)
        type: string
        default: '.'
      run-tests:
        description: Run `npm run test` in test-working-directory
        type: boolean
        default: false
      test-working-directory:
        description: Directory where tests run
        type: string
        default: ''
      install-chrome:
        description: Install (and cache) Chrome for puppeteer-based tests
        type: boolean
        default: false
    outputs:
      changed:
        description: Whether files matching `path` changed in this event
        value: ${{ jobs.changes.outputs.changed }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.project }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            project:
              - '${{ inputs.path }}'

  build:
    needs: [changes]
    if: ${{ needs.changes.outputs.changed == 'true' && inputs.nx-project != '' }}
    runs-on: ubuntu-latest
    env:
      # Chrome is only needed by the test job (stencil e2e)
      PUPPETEER_SKIP_DOWNLOAD: 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: yarn
      - name: Restore Nx cache
        uses: actions/cache@v5
        with:
          path: .nx
          key: nx-${{ hashFiles('yarn.lock') }}-${{ github.sha }}
          restore-keys: |
            nx-${{ hashFiles('yarn.lock') }}-
      - run: yarn install --frozen-lockfile --prefer-offline
      - run: yarn nx run ${{ inputs.nx-project }}:build
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ format('{0}-build', inputs.nx-project) }}
          path: ${{ inputs.artifact-paths }}
          retention-days: 1
          include-hidden-files: true

  test:
    needs: [changes, build]
    if: >-
      ${{ !cancelled() && inputs.run-tests &&
          needs.changes.outputs.changed == 'true' &&
          (needs.build.result == 'success' || needs.build.result == 'skipped') }}
    runs-on: ubuntu-latest
    env:
      # puppeteer treats 'false' as falsy: Chrome is downloaded only when install-chrome is set
      PUPPETEER_SKIP_DOWNLOAD: ${{ !inputs.install-chrome }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: yarn
      - name: Restore Puppeteer Chrome cache
        if: ${{ inputs.install-chrome }}
        uses: actions/cache@v5
        with:
          path: .cache/puppeteer
          key: puppeteer-${{ hashFiles('yarn.lock') }}
      # postinstall downloads Chrome into .cache/puppeteer (see .puppeteerrc.cjs) unless cached
      - run: yarn install --frozen-lockfile --prefer-offline
      - if: ${{ inputs.nx-project != '' }}
        uses: actions/download-artifact@v8
        with:
          name: ${{ format('{0}-build', inputs.nx-project) }}
          path: ${{ inputs.artifact-download-path }}
      - working-directory: ${{ inputs.test-working-directory }}
        run: npm run test
