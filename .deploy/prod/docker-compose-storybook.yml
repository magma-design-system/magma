version: '3.1'

services:
  designsystem:
    image: maggiolieditore.azurecr.io/magma-storybook:${CI_COMMIT_SHORT_SHA}
    restart: always
    container_name: magma-storybook
    expose:
      - "443"
    environment:
      - VIRTUAL_HOST=magma.maggiolicloud.it
      - LETSENCRYPT_HOST=magma.maggiolicloud.it

networks:
  default:
    external:
      name: nginx-proxy
